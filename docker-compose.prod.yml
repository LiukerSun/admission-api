services:
  db:
    # PG 18：与 Dockerfile 里 API 容器自带的 pg_dump/pg_restore client 版本对齐，
    # 避免跨大版本 client/server 组合产生 "unrecognized configuration parameter
    # transaction_timeout" 之类的 warning。首次 deploy 这版会被 Jenkins pipeline
    # 的 "Postgres major upgrade if needed" stage 自动迁移（dump→删旧 volume→
    # 起空 PG 18 cluster→restore）；之后再 build 直接复用现有 PG 18 volume。
    image: postgres:18-alpine
    container_name: admission-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-admission}
    volumes:
      # PG 18+ 官方 image 改了 entrypoint 约定：挂载点要在父目录 /var/lib/postgresql，
      # 数据自动落到 mount/data/ 子目录。挂到老路径 /var/lib/postgresql/data 会被
      # PG 18 当成"unused mount"拒绝初始化（错误："Counter to that, there appears
      # to be PostgreSQL data in: /var/lib/postgresql/data"）。
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: admission-redis
    env_file:
      - .env
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: admission-api:latest
    container_name: admission-api
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-admission}?sslmode=disable
      REDIS_ADDR: redis:${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS:-168}
      ENV: ${ENV:-production}
      # 证书在容器里固定挂在 /run/secrets/，env_file 里也是写这个路径。
      # 这两行把"路径"硬编码在 compose 里，避免 .env 改错导致后端找不到证书。
      ALIPAY_APP_PRIVATE_KEY_PATH: /run/secrets/alipay_app_private_key
      ALIPAY_APP_PUBLIC_CERT_PATH: /run/secrets/alipay_app_public_cert
      ALIPAY_ALIPAY_PUBLIC_CERT_PATH: /run/secrets/alipay_alipay_public_cert
      ALIPAY_ALIPAY_ROOT_CERT_PATH: /run/secrets/alipay_alipay_root_cert
    secrets:
      - alipay_app_private_key
      - alipay_app_public_cert
      - alipay_alipay_public_cert
      - alipay_alipay_root_cert
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../admission-frontend
      dockerfile: Dockerfile
    image: admission-frontend:latest
    container_name: admission-frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

# 证书走 Docker Compose secrets：
#   - 文件本身在宿主机 /etc/admission-api/certs/ 下（由 Jenkins SCP 部署）
#   - 容器内自动挂载为 /run/secrets/<secret_name>，权限 0444 只读
#   - 不会写进 image layer，不会出现在 docker inspect 的 env 里
# 私钥使用 .pem，证书使用 .crt——名字无关，路径写对即可。
secrets:
  alipay_app_private_key:
    file: /etc/admission-api/certs/app_private.pem
  alipay_app_public_cert:
    file: /etc/admission-api/certs/app_public.crt
  alipay_alipay_public_cert:
    file: /etc/admission-api/certs/alipay_public.crt
  alipay_alipay_root_cert:
    file: /etc/admission-api/certs/alipay_root.crt
