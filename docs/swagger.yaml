          schema:
            $ref: '#/definitions/web.Response'
      summary: List universities
      tags:
      - admission
  /api/v1/admission/universities/{id}/profile:
    get:
      description: Returns a university yearly profile. If profile_year is omitted,
        the latest profile is used.
      parameters:
      - description: University ID
        in: path
        name: id
        required: true
        type: integer
      - description: Profile year
        in: query
        name: profile_year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
