  /api/v1/admission/recommendations:
    post:
      consumes:
      - application/json
      description: 基于学生省份、选科、分数、位次、单科成绩、家庭资源、个人画像、地域偏好、专业偏好、职业规划，输出冲/稳/保三档志愿表，并对每个志愿给出综合评分与推荐理由。
