basePath: /
definitions:
  analysis.EnrollmentPlan:
    properties:
      actual_count:
        description: 实际招生人数
        type: integer
      average_score:
        description: 平均分数线
        type: integer
      batch:
        description: 批次（一本、二本等）
        type: string
      id:
        type: integer
      major_code:
        description: 专业代码
        type: string
      major_name:
        description: 专业名称
        type: string
      max_score:
        description: 最高分数线
        type: integer
      min_score:
        description: 最低分数线
        type: integer
      plan_count:
        description: 计划招生人数
        type: integer
      province:
        description: 省份
        type: string
      school_code:
        description: 学校代码
        type: string
      school_name:
        description: 学校名称
        type: string
      subject_require:
        description: 科目要求
        type: string
      year:
        description: 年份
        type: integer
    type: object
  analysis.EnrollmentPlanResponse:
    properties:
      page:
        description: 当前页码
        type: integer
      per_page:
        description: 每页数量
        type: integer
      plans:
        description: 招生计划列表
        items:
          $ref: '#/definitions/analysis.EnrollmentPlan'
        type: array
      total:
        description: 总数据量
        type: integer
    type: object
  user.BindingListResponse:
    properties:
      bindings:
        items:
          $ref: '#/definitions/user.BindingWithUserDetail'
        type: array
      user_type:
        example: parent
        type: string
    type: object
  user.BindingResponse:
    properties:
      created_at:
        example: "2026-04-20T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      parent_id:
        example: 2
        type: integer
      student_id:
        example: 5
        type: integer
    type: object
  user.BindingWithUserDetail:
    properties:
      created_at:
        type: string
      id:
        type: integer
      user:
        $ref: '#/definitions/user.SafeUser'
    type: object
  user.CreateBindingRequest:
    properties:
      student_email:
        example: xiaoming@example.com
        type: string
    required:
    - student_email
    type: object
  user.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  user.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
      user_type:
        enum:
        - parent
        - student
        example: parent
        type: string
    required:
    - email
    - password
    - user_type
    type: object
  user.Response:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      role:
        example: user
        type: string
      user_type:
        example: parent
        type: string
    type: object
  user.SafeUser:
    properties:
      email:
        type: string
      id:
        type: integer
    type: object
  user.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: abc123...
        type: string
    type: object
  web.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: 志愿报考分析平台后端 API
  title: Admission API
  version: "1.0"
paths:
  /api/v1/admin/bindings/{id}:
    delete:
      consumes:
      - application/json
      description: 仅管理员可调用，解除家长-学生绑定关系
      parameters:
      - description: Binding ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员解除绑定
      tags:
      - admin
  /api/v1/analysis/enrollment-plans:
    get:
      consumes:
      - application/json
      description: 获取模拟的招生计划数据，支持分页和筛选
      parameters:
      - description: 学校名称
        in: query
        name: school_name
        type: string
      - description: 专业名称
        in: query
        name: major_name
        type: string
      - description: 省份
        in: query
        name: province
        type: string
      - description: 年份
        in: query
        name: year
        type: integer
      - description: 批次
        in: query
        name: batch
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/analysis.EnrollmentPlanResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: 获取招生计划数据
      tags:
      - analysis
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用邮箱和密码登录，获取 Access Token 和 Refresh Token
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.TokenResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
      summary: 用户登录
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: 用 Refresh Token 换取新的双 Token
      parameters:
      - description: Refresh Token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 刷新 Access Token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 使用邮箱和密码注册新账户
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.Response'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/web.Response'
      summary: 用户注册
      tags:
      - auth
  /api/v1/bindings:
    get:
      consumes:
      - application/json
      description: 家长返回绑定的学生列表，学生返回绑定的家长信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.BindingListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 查询我的绑定关系
      tags:
      - binding
    post:
      consumes:
      - application/json
      description: 家长通过学生邮箱发起绑定，即时生效
      parameters:
      - description: 绑定信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.CreateBindingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.BindingResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 发起家长-学生绑定
      tags:
      - binding
  /api/v1/me:
    get:
      consumes:
      - application/json
      description: 返回当前登录用户的个人信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.Response'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - user
  /health:
    get:
      consumes:
      - application/json
      description: 检查服务及数据库连接状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/web.Response'
      summary: 健康检查
      tags:
      - health
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: '"Bearer {token}"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
