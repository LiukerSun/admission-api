          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: List standard majors
      tags:
      - admission
  /api/v1/admission/universities:
    get:
      description: Returns university identities enriched with latest profile information.
        Filters can narrow the result by region, school category, ownership type,
        education level, and university-tier flags.
      parameters:
      - description: Search university code or name
        in: query
        name: q
        type: string
      - description: Comma-separated region codes
        in: query
        name: region_codes
        type: string
      - description: Comma-separated school category codes
        in: query
        name: school_category_codes
        type: string
      - description: Comma-separated school ownership type codes
        in: query
        name: ownership_type_codes
        type: string
      - description: Education level code
        in: query
        name: education_level_code
        type: string
      - description: Filter by 985 (1/0)
        in: query
        name: is_985
        type: string
      - description: Filter by 211 (1/0)
        in: query
        name: is_211
        type: string
      - description: Filter by double-first-class (1/0)
        in: query
        name: is_double_first_class
        type: string
      - description: Filter by national-key (1/0)
        in: query
        name: is_national_key
        type: string
      - description: Filter by provincial-key (1/0)
        in: query
        name: is_provincial_key
        type: string
      - description: Filter by postgraduate-recommendation eligibility (1/0)
        in: query
        name: has_postgraduate_recommendation
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/admission.UniversityResponse'
                  type: array
              type: object
        "500":
