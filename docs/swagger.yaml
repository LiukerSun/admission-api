basePath: /
definitions:
  admin.BindingListItem:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      parent:
        $ref: '#/definitions/admin.SafeUserInfo'
      student:
        $ref: '#/definitions/admin.SafeUserInfo'
    type: object
  admin.BindingListResponse:
    properties:
      bindings:
        items:
          $ref: '#/definitions/admin.BindingListItem'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
    type: object
  admin.ResetPasswordRequest:
    properties:
      new_password:
        example: newpass123
        minLength: 8
        type: string
    required:
    - new_password
    type: object
  admin.SafeUserInfo:
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
    type: object
  admin.StatsResponse:
    properties:
      active_users:
        example: 950
        type: integer
      banned_users:
        example: 50
        type: integer
      total_bindings:
        example: 500
        type: integer
      total_users:
        example: 1000
        type: integer
      users_by_role:
        additionalProperties:
          type: integer
        type: object
    type: object
  admin.UpdateRoleRequest:
    properties:
      role:
        enum:
        - user
        - premium
        - admin
        example: premium
        type: string
    required:
    - role
    type: object
  admin.UpdateUserRequest:
    properties:
      email:
        example: user@example.com
        type: string
      role:
        enum:
        - user
        - premium
        - admin
        example: premium
        type: string
      status:
        enum:
        - active
        - banned
        example: active
        type: string
      user_type:
        enum:
        - parent
        - student
        example: student
        type: string
      username:
        example: johndoe
        maxLength: 50
        minLength: 1
        type: string
    type: object
  admin.UserListItem:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      user_type:
        example: student
        type: string
      username:
        example: johndoe
        type: string
    type: object
  admin.UserListResponse:
    properties:
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
      users:
        items:
          $ref: '#/definitions/admin.UserListItem'
        type: array
    type: object
  admin.UserResponse:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      updated_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      user_type:
        example: student
        type: string
      username:
        example: johndoe
        type: string
    type: object
  analysis.EmploymentData:
    properties:
      average_salary:
        description: 平均薪资
        type: number
      employment_province:
        description: 就业省份
        type: string
      employment_rate:
        description: 就业率
        type: number
      further_study_rate:
        description: 深造率
        type: number
      graduates_count:
        description: 毕业生总数
        type: integer
      highest_salary:
        description: 最高薪资
        type: number
      id:
        description: 数据ID
        type: integer
      industry:
        description: 主要就业行业
        type: string
      job_title:
        description: 主要职位
        type: string
      lowest_salary:
        description: 最低薪资
        type: number
      major_code:
        description: 专业代码
        type: string
      major_name:
        description: 专业名称
        type: string
      province:
        description: 省份
        type: string
      year:
        description: 年份
        type: integer
    type: object
  analysis.EmploymentDataResponse:
    properties:
      data:
        description: 就业情况列表
        items:
          $ref: '#/definitions/analysis.EmploymentData'
        type: array
      page:
        description: 当前页码
        type: integer
      per_page:
        description: 每页数量
        type: integer
      total:
        description: 总数据量
        type: integer
    type: object
  analysis.EnrollmentPlan:
    properties:
      actual_count:
        description: 实际招生人数
        type: integer
      average_score:
        description: 平均分数线
        type: integer
      batch:
        description: 批次（一本、二本等）
        type: string
      id:
        type: integer
      major_code:
        description: 专业代码
        type: string
      major_name:
        description: 专业名称
        type: string
      max_score:
        description: 最高分数线
        type: integer
      min_score:
        description: 最低分数线
        type: integer
      plan_count:
        description: 计划招生人数
        type: integer
      province:
        description: 省份
        type: string
      school_code:
        description: 学校代码
        type: string
      school_name:
        description: 学校名称
        type: string
      subject_require:
        description: 科目要求
        type: string
      year:
        description: 年份
        type: integer
    type: object
  analysis.EnrollmentPlanResponse:
    properties:
      page:
        description: 当前页码
        type: integer
      per_page:
        description: 每页数量
        type: integer
      plans:
        description: 招生计划列表
        items:
          $ref: '#/definitions/analysis.EnrollmentPlan'
        type: array
      total:
        description: 总数据量
        type: integer
    type: object
  user.BindingListResponse:
    properties:
      bindings:
        items:
          $ref: '#/definitions/user.BindingWithUserDetail'
        type: array
      user_type:
        example: parent
        type: string
    type: object
  user.BindingResponse:
    properties:
      created_at:
        example: "2026-04-20T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      parent_id:
        example: 2
        type: integer
      student_id:
        example: 5
        type: integer
    type: object
  user.BindingWithUserDetail:
    properties:
      created_at:
        type: string
      id:
        type: integer
      user:
        $ref: '#/definitions/user.SafeUser'
    type: object
  user.ChangePasswordRequest:
    properties:
      current_password:
        example: oldpass123
        minLength: 8
        type: string
      new_password:
        example: newpass123
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  user.CreateBindingRequest:
    properties:
      student_email:
        example: xiaoming@example.com
        type: string
    required:
    - student_email
    type: object
  user.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  user.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
      user_type:
        enum:
        - parent
        - student
        example: parent
        type: string
    required:
    - email
    - password
    - user_type
    type: object
  user.Response:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      user_type:
        example: parent
        type: string
      username:
        example: johndoe
        type: string
    type: object
  user.SafeUser:
    properties:
      email:
        type: string
      id:
        type: integer
    type: object
  user.SendPhoneCodeRequest:
    properties:
      phone:
        example: "13800138000"
        type: string
    required:
    - phone
    type: object
  user.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: abc123...
        type: string
    type: object
  user.VerifyPhoneRequest:
    properties:
      code:
        example: "123456"
        type: string
      phone:
        example: "13800138000"
        type: string
    required:
    - code
    - phone
    type: object
  web.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: 志愿报考分析平台后端 API
  title: Admission API
  version: "1.0"
paths:
  /api/v1/admin/bindings:
    get:
      consumes:
      - application/json
      description: 分页获取所有家长-学生绑定关系
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.BindingListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员查看所有绑定关系
      tags:
      - admin
  /api/v1/admin/bindings/{id}:
    delete:
      consumes:
      - application/json
      description: 仅管理员可调用，解除家长-学生绑定关系
      parameters:
      - description: Binding ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员解除绑定
      tags:
      - admin
  /api/v1/admin/stats:
    get:
      consumes:
      - application/json
      description: 获取用户总数、绑定总数等运营数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.StatsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员查看系统统计
      tags:
      - admin
  /api/v1/admin/users:
    get:
      consumes:
      - application/json
      description: 分页获取所有用户信息，支持按 email、username、role、status 过滤
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: email 模糊搜索
        in: query
        name: email
        type: string
      - description: username 模糊搜索
        in: query
        name: username
        type: string
      - description: 角色过滤 (user/premium/admin)
        in: query
        name: role
        type: string
      - description: 状态过滤 (active/banned)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员获取用户列表
      tags:
      - admin
  /api/v1/admin/users/{id}:
    get:
      consumes:
      - application/json
      description: 获取指定用户的完整信息，用于前端编辑表单回填
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员获取用户详情
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: 修改指定用户的 email、username、role、user_type、status
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员修改用户信息
      tags:
      - admin
  /api/v1/admin/users/{id}/disable:
    post:
      consumes:
      - application/json
      description: 禁用指定用户，清除其所有 refresh token
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员禁用用户
      tags:
      - admin
  /api/v1/admin/users/{id}/enable:
    post:
      consumes:
      - application/json
      description: 解除对指定用户的禁用状态
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员启用用户
      tags:
      - admin
  /api/v1/admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: 管理员为指定用户重置密码，重置后用户需重新登录
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 新密码
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员重置用户密码
      tags:
      - admin
  /api/v1/admin/users/{id}/role:
    put:
      consumes:
      - application/json
      description: 修改指定用户的角色
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员修改用户角色
      tags:
      - admin
  /api/v1/analysis/employment-data:
    get:
      consumes:
      - application/json
      description: 获取模拟的专业就业情况数据，支持分页和筛选
      parameters:
      - description: 专业名称
        in: query
        name: major_name
        type: string
      - description: 省份
        in: query
        name: province
        type: string
      - description: 年份
        in: query
        name: year
        type: integer
      - description: 行业
        in: query
        name: industry
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/analysis.EmploymentDataResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: 获取就业情况数据
      tags:
      - analysis
  /api/v1/analysis/enrollment-plans:
    get:
      consumes:
      - application/json
      description: 获取模拟的招生计划数据，支持分页和筛选
      parameters:
      - description: 学校名称
        in: query
        name: school_name
        type: string
      - description: 专业名称
        in: query
        name: major_name
        type: string
      - description: 省份
        in: query
        name: province
        type: string
      - description: 年份
        in: query
        name: year
        type: integer
      - description: 批次
        in: query
        name: batch
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/analysis.EnrollmentPlanResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: 获取招生计划数据
      tags:
      - analysis
