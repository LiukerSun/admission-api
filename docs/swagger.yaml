        type: boolean
      message_id:
        type: integer
    type: object
  payment.AlipayPayResponse:
    properties:
      expires_at:
        type: string
      order_no:
        example: MO202605101200000001
        type: string
      pay_url:
        example: https://openapi-sandbox.dl.alipaydev.com/gateway.do?...
        type: string
    type: object
  payment.CreateOrderRequest:
    properties:
      channel:
        enum:
        - mock
        - alipay
        example: alipay
        type: string
      idempotency_key:
        example: checkout-123
        maxLength: 128
        type: string
      plan_code:
        enum:
        - monthly
        - quarterly
        - yearly
        example: monthly
        type: string
    required:
    - plan_code
    type: object
  payment.MockCallbackRequest:
    properties:
      callback_id:
        example: mock-callback-1
        maxLength: 128
        type: string
      channel_trade_no:
        example: MOCK202604231200000001
        maxLength: 128
        type: string
      order_no:
        example: MO202604231200000001
        type: string
      success:
        example: true
        type: boolean
    required:
    - callback_id
    - channel_trade_no
    - order_no
    type: object
  user.ChangePasswordRequest:
    properties:
      current_password:
        example: oldpass123
        minLength: 8
        type: string
      new_password:
        example: newpass123
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  user.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  user.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.Response:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      is_admin:
        example: false
        type: boolean
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      username:
        example: johndoe
        type: string
    type: object
  user.SendPhoneCodeRequest:
    properties:
      phone:
        example: "13800138000"
        type: string
    required:
    - phone
    type: object
  user.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: abc123...
        type: string
    type: object
  user.VerifyPhoneRequest:
    properties:
      code:
        example: "123456"
        type: string
      phone:
        example: "13800138000"
        type: string
    required:
    - code
    - phone
    type: object
  web.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: 志愿报考分析平台后端 API
  title: Admission API
  version: "1.0"
paths:
  /api/v1/admin/recommendation/scores/refresh:
    post:
      consumes:
      - application/json
      description: 扫描 recommendation_precomputed_scores 中缺失或过期（默认 90 天）的 (university
        × major) 行，逐个调用评估器（默认 LLM）填充五维基准分。可指定批量大小。
      parameters:
      - description: 刷新参数
        in: body
        name: body
        schema:
          $ref: '#/definitions/admission.refreshScoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admission.RefreshResult'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 刷新推荐打分缓存（管理员）
      tags:
      - admin
  /api/v1/admin/stats:
    get:
      consumes:
