basePath: /
definitions:
  admin.ResetPasswordRequest:
    properties:
      new_password:
        example: newpass123
        minLength: 8
        type: string
    required:
    - new_password
    type: object
  admin.StatsResponse:
    properties:
      active_users:
        example: 950
        type: integer
      banned_users:
        example: 50
        type: integer
      total_users:
        example: 1000
        type: integer
      users_by_role:
        additionalProperties:
          type: integer
        type: object
    type: object
  admin.UpdateRoleRequest:
    properties:
      role:
        enum:
        - user
        - premium
        example: premium
        type: string
    required:
    - role
    type: object
  admin.UpdateUserRequest:
    properties:
      email:
        example: user@example.com
        type: string
      is_admin:
        example: false
        type: boolean
      role:
        enum:
        - user
        - premium
        example: premium
        type: string
      status:
        enum:
        - active
        - banned
        example: active
        type: string
      username:
        example: johndoe
        maxLength: 50
        minLength: 1
        type: string
    type: object
  admin.UserListItem:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      is_admin:
        example: false
        type: boolean
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      username:
        example: johndoe
        type: string
    type: object
  admin.UserListResponse:
    properties:
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
      users:
        items:
          $ref: '#/definitions/admin.UserListItem'
        type: array
    type: object
  admin.UserResponse:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      is_admin:
        example: false
        type: boolean
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      updated_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      username:
        example: johndoe
        type: string
    type: object
  admission.AdmissionLineResponse:
    properties:
      admission_group_id:
        type: integer
      admission_remark:
        type: string
      admission_year:
        type: integer
      admitted_count:
        type: integer
      batch_code:
        type: string
      duration:
        type: string
      equivalent_min_score:
        type: integer
      group_code:
        type: string
      id:
        type: integer
      local_major_code:
        type: string
      local_major_name:
        type: string
      max_rank:
        type: integer
      max_score:
        type: integer
      min_rank:
        type: integer
      min_score:
        type: integer
      plan_count:
        type: integer
      region_code:
        type: string
      subject_category_code:
        type: string
      subject_requirement_code:
        type: string
      tuition:
        type: integer
      university_code:
        type: string
      university_id:
        type: integer
      university_major_line_id:
        type: integer
      university_name:
        type: string
    type: object
  admission.DictionaryItem:
    properties:
      code:
        type: string
      name:
        type: string
    type: object
  admission.DictionaryResponse:
    properties:
      batches:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
      education_levels:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
      regions:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
      school_categories:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
      school_ownership_types:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
      subject_categories:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
      subject_requirements:
        items:
          $ref: '#/definitions/admission.DictionaryItem'
        type: array
    type: object
  admission.LatestCatalogYearResponse:
    properties:
      catalog_year:
        type: integer
    type: object
  admission.StandardMajorResponse:
    properties:
      catalog_year:
        type: integer
      category_code:
        type: string
      category_name:
        type: string
      class_code:
        type: string
      class_name:
        type: string
      degree_category:
        type: string
      duration:
        type: string
      id:
        type: integer
      major_code:
        type: string
      name:
        type: string
      source_url:
        type: string
    type: object
  admission.UniversityProfileResponse:
    properties:
      affiliation:
        type: string
      alumni_rank:
        type: string
      city:
        type: string
      difficulty_rank:
        type: string
      doctoral_program_count:
        type: integer
      education_level_code:
        type: string
      excellence_tags:
        type: string
      has_postgraduate_recommendation:
        type: boolean
      id:
        type: integer
      is_211:
        type: boolean
      is_985:
        type: boolean
      is_double_first_class:
        type: boolean
      is_national_key:
        type: boolean
      is_provincial_key:
        type: boolean
      master_program_count:
        type: integer
      national_key_subject_count:
        type: integer
      ownership_type_code:
        type: string
      postgraduate_recommendation_rate:
        type: number
      profile_year:
        type: integer
      region_code:
        type: string
      school_category_code:
        type: string
      school_level_tags:
        type: string
      soft_rank:
        type: string
      university_id:
        type: integer
    type: object
  admission.UniversityResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      normalized_name:
        type: string
      university_code:
        type: string
    type: object
  membership.CurrentMembershipResponse:
    properties:
      active:
        example: true
        type: boolean
      ends_at:
        example: "2026-05-23T10:00:00Z"
        type: string
      membership_level:
        example: premium
        type: string
      started_at:
        example: "2026-04-23T10:00:00Z"
        type: string
      status:
        example: active
        type: string
    type: object
  membership.PlanResponse:
    properties:
      currency:
        example: CNY
        type: string
      duration_days:
        example: 30
        type: integer
      id:
        example: 1
        type: integer
      membership_level:
        example: premium
        type: string
      plan_code:
        example: monthly
        type: string
      plan_name:
        example: 月度会员
        type: string
      price_amount:
        example: 990
        type: integer
      status:
        example: active
        type: string
    type: object
  payment.CreateOrderRequest:
    properties:
      idempotency_key:
        example: checkout-123
        maxLength: 128
        type: string
      plan_code:
        enum:
        - monthly
        - quarterly
        - yearly
        example: monthly
        type: string
    required:
    - plan_code
    type: object
  payment.MockCallbackRequest:
    properties:
      callback_id:
        example: mock-callback-1
        maxLength: 128
        type: string
      channel_trade_no:
        example: MOCK202604231200000001
        maxLength: 128
        type: string
      order_no:
        example: MO202604231200000001
        type: string
      success:
        example: true
        type: boolean
    required:
    - callback_id
    - channel_trade_no
    - order_no
    type: object
  payment.OrderListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/payment.OrderResponse'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 1
        type: integer
    type: object
  payment.OrderResponse:
    properties:
      amount:
        example: 990
        type: integer
      closed_at:
        example: "2026-04-23T10:15:00Z"
        type: string
      created_at:
        example: "2026-04-23T10:00:00Z"
        type: string
      currency:
        example: CNY
        type: string
      entitlement_status:
        example: pending
        type: string
      expires_at:
        example: "2026-04-23T10:15:00Z"
        type: string
      order_no:
        example: MO202604231200000001
        type: string
      order_status:
        example: awaiting_payment
        type: string
      paid_at:
        example: "2026-04-23T10:01:00Z"
        type: string
      payment_channel:
        example: mock
        type: string
      payment_status:
        example: unpaid
        type: string
      plan_code:
        example: monthly
        type: string
      subject:
        example: 月度会员
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  user.ChangePasswordRequest:
    properties:
      current_password:
        example: oldpass123
        minLength: 8
        type: string
      new_password:
        example: newpass123
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  user.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  user.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.Response:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      is_admin:
        example: false
        type: boolean
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      username:
        example: johndoe
        type: string
    type: object
  user.SendPhoneCodeRequest:
    properties:
      phone:
        example: "13800138000"
        type: string
    required:
    - phone
    type: object
  user.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: abc123...
        type: string
    type: object
  user.VerifyPhoneRequest:
    properties:
      code:
        example: "123456"
        type: string
      phone:
        example: "13800138000"
        type: string
    required:
    - code
    - phone
    type: object
  web.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: 志愿报考分析平台后端 API
  title: Admission API
  version: "1.0"
paths:
  /api/v1/admin/stats:
    get:
      consumes:
      - application/json
      description: 获取用户总数、会员等级分布和账号状态等运营数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.StatsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员查看系统统计
      tags:
      - admin
  /api/v1/admin/users:
    get:
      consumes:
      - application/json
      description: 分页获取所有用户信息，支持按 email、username、role、status 过滤
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: email 模糊搜索
        in: query
        name: email
        type: string
      - description: username 模糊搜索
        in: query
        name: username
        type: string
      - description: 角色过滤 (user/premium)
        in: query
        name: role
        type: string
      - description: 管理员权限过滤
        in: query
        name: is_admin
        type: boolean
      - description: 状态过滤 (active/banned)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员获取用户列表
      tags:
      - admin
  /api/v1/admin/users/{id}:
    get:
      consumes:
      - application/json
      description: 获取指定用户的完整信息，用于前端编辑表单回填
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员获取用户详情
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: 修改指定用户的 email、username、role、is_admin、status
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员修改用户信息
      tags:
      - admin
  /api/v1/admin/users/{id}/disable:
    post:
      consumes:
      - application/json
      description: 禁用指定用户，清除其所有 refresh token
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员禁用用户
      tags:
      - admin
  /api/v1/admin/users/{id}/enable:
    post:
      consumes:
      - application/json
      description: 解除对指定用户的禁用状态
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员启用用户
      tags:
      - admin
  /api/v1/admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: 管理员为指定用户重置密码，重置后用户需重新登录
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 新密码
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员重置用户密码
      tags:
      - admin
  /api/v1/admin/users/{id}/role:
    put:
      consumes:
      - application/json
      description: 修改指定用户的角色
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web.Response'
      security:
      - BearerAuth: []
      summary: 管理员修改用户角色
      tags:
      - admin
  /api/v1/admission/admission-lines:
    get:
      description: Returns school-major admission lines with university, admission
        group, local school major, score, rank, and plan fields. If admission_year
        is omitted, the latest available admission year is used for the selected region
        and subject category.
      parameters:
      - description: Admission year
        in: query
        name: admission_year
        type: integer
      - description: Region code
        in: query
        name: region_code
        type: string
      - description: Subject category code
        in: query
        name: subject_category_code
        type: string
      - description: Comma-separated internal university IDs
        in: query
        name: university_ids
        type: string
      - description: Comma-separated school-published university codes
        in: query
        name: university_codes
        type: string
      - description: Comma-separated admission group codes
        in: query
        name: group_codes
        type: string
      - description: CHSI tag catalog year
        in: query
        name: tag_catalog_year
        type: integer
      - description: CHSI tag keyword, matching category/class/major code or name
        in: query
        name: tag_query
        type: string
      - description: CHSI major category code
        in: query
        name: tag_category_code
        type: string
      - description: CHSI major class code
        in: query
        name: tag_class_code
        type: string
      - description: CHSI standard major code
        in: query
        name: tag_major_code
        type: string
      - description: Minimum rank lower bound
        in: query
        name: min_rank_from
        type: integer
      - description: Minimum rank upper bound
        in: query
        name: min_rank_to
        type: integer
      - description: Minimum score lower bound
        in: query
        name: min_score_from
        type: integer
      - description: Minimum score upper bound
        in: query
        name: min_score_to
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/admission.AdmissionLineResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: List admission lines
      tags:
      - admission
  /api/v1/admission/dictionaries:
    get:
      description: Returns code-name values used by admission filters and imports.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/admission.DictionaryResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: List admission dictionaries
      tags:
      - admission
