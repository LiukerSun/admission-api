  /api/v1/admission/admission-lines:
    get:
      description: Returns school-major admission lines with university, admission
        group, local school major, score, rank, and plan fields. If admission_year
        is omitted, the latest available admission year is used for the selected region
        and subject category.
      parameters:
      - description: Admission year
        in: query
        name: admission_year
        type: integer
      - description: Region code
        in: query
        name: region_code
        type: string
      - description: Subject category code
        in: query
        name: subject_category_code
        type: string
      - description: Comma-separated internal university IDs
        in: query
        name: university_ids
        type: string
      - description: Comma-separated school-published university codes
        in: query
        name: university_codes
        type: string
      - description: Comma-separated admission group codes
        in: query
        name: group_codes
        type: string
      - description: CHSI tag catalog year
        in: query
        name: tag_catalog_year
        type: integer
      - description: CHSI tag keyword, matching category/class/major code or name
        in: query
        name: tag_query
        type: string
      - description: CHSI major category code
        in: query
        name: tag_category_code
        type: string
      - description: CHSI major class code
        in: query
        name: tag_class_code
        type: string
      - description: CHSI standard major code
        in: query
        name: tag_major_code
        type: string
      - description: Minimum rank lower bound
        in: query
        name: min_rank_from
        type: integer
      - description: Minimum rank upper bound
        in: query
        name: min_rank_to
        type: integer
      - description: Minimum score lower bound
        in: query
        name: min_score_from
        type: integer
      - description: Minimum score upper bound
        in: query
        name: min_score_to
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/admission.AdmissionLineResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: List admission lines
      tags:
      - admission
  /api/v1/admission/aggregate:
    get:
      description: 'Aggregates admission lines by a dimension (province, city, subject_category,
        university, group). Supports metrics: count, avg_min_score, avg_min_rank,
        avg_tuition, is_985_count, is_211_count, is_double_first_class_count.'
      parameters:
      - description: Admission year
        in: query
        name: admission_year
        type: integer
      - description: Region code
        in: query
        name: region_code
        type: string
      - description: Subject category code
        in: query
        name: subject_category_code
        type: string
      - description: Comma-separated internal university IDs
        in: query
        name: university_ids
        type: string
      - description: Comma-separated school-published university codes
        in: query
        name: university_codes
        type: string
      - description: Comma-separated admission group codes
        in: query
        name: group_codes
        type: string
      - description: CHSI tag catalog year
        in: query
        name: tag_catalog_year
        type: integer
      - description: CHSI tag keyword
        in: query
        name: tag_query
        type: string
      - description: CHSI major category code
        in: query
        name: tag_category_code
        type: string
      - description: CHSI major class code
        in: query
        name: tag_class_code
        type: string
      - description: CHSI standard major code
        in: query
        name: tag_major_code
        type: string
      - description: Minimum rank lower bound
        in: query
        name: min_rank_from
        type: integer
      - description: Minimum rank upper bound
        in: query
        name: min_rank_to
        type: integer
      - description: Minimum score lower bound
        in: query
        name: min_score_from
        type: integer
      - description: Minimum score upper bound
        in: query
        name: min_score_to
        type: integer
      - description: Filter by 985 status
        in: query
        name: is_985
        type: boolean
      - description: Filter by 211 status
        in: query
        name: is_211
        type: boolean
      - description: Filter by double-first-class status
        in: query
        name: is_double_first_class
        type: boolean
      - description: 'Dimension to group by: province, city, subject_category, university,
          group'
        in: query
        name: group_by
        required: true
        type: string
      - description: 'Comma-separated metrics: count, avg_min_score, avg_min_rank,
          avg_tuition, is_985_count, is_211_count, is_double_first_class_count'
        in: query
        name: metrics
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: Aggregate admission data
      tags:
      - admission
  /api/v1/admission/dictionaries:
    get:
      description: Returns code-name values used by admission filters and imports.
      produces:
