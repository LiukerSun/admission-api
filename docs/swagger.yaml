    type: object
  user.BindingWithUserDetail:
    properties:
      created_at:
        type: string
      id:
        type: integer
      user:
        $ref: '#/definitions/user.SafeUser'
    type: object
  user.ChangePasswordRequest:
    properties:
      current_password:
        example: oldpass123
        minLength: 8
        type: string
      new_password:
        example: newpass123
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  user.CreateBindingRequest:
    properties:
      student_email:
        example: xiaoming@example.com
        type: string
    required:
    - student_email
    type: object
  user.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  user.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  user.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: pass1234
        minLength: 8
        type: string
      user_type:
        enum:
        - parent
        - student
        example: parent
        type: string
    required:
    - email
    - password
    - user_type
    type: object
  user.Response:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      phone:
        example: "13800138000"
        type: string
      phone_verified:
        example: true
        type: boolean
      role:
        example: user
        type: string
      status:
        example: active
        type: string
      user_type:
        example: parent
        type: string
      username:
        example: johndoe
        type: string
    type: object
  user.SafeUser:
    properties:
      email:
        type: string
      id:
        type: integer
    type: object
  user.SendPhoneCodeRequest:
    properties:
      phone:
        example: "13800138000"
        type: string
    required:
    - phone
    type: object
  user.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: abc123...
        type: string
    type: object
  user.VerifyPhoneRequest:
    properties:
      code:
        example: "123456"
        type: string
      phone:
        example: "13800138000"
        type: string
    required:
    - code
    - phone
    type: object
  web.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
