  /api/v1/analysis/score-match:
    get:
      description: 基于历史录取分和位次返回冲稳保参考结果，不代表录取概率
      parameters:
      - description: 省份ID
        in: query
        name: province_id
        type: string
      - description: 省份名称
        in: query
        name: province
        type: string
      - description: 年份
        in: query
        name: year
        required: true
        type: integer
      - description: 科类
        in: query
        name: section
        type: string
      - description: 分数，score 或 rank 至少传一个
        in: query
        name: score
        type: number
      - description: 位次，优先用于匹配
        in: query
        name: rank
        type: integer
      - description: 匹配目标：school 或 major，默认 major
        in: query
        name: target
        type: string
      - description: 策略：rush,stable,safe,all，默认 all
        in: query
        name: strategy
        type: string
      - description: 分数窗口，预留字段
        in: query
        name: score_window
        type: integer
      - description: 位次窗口比例，预留字段
        in: query
        name: rank_window_ratio
        type: number
      - description: 学校标签，逗号分隔
        in: query
        name: school_tags
        type: string
      - description: 院校省份过滤，预留字段
        in: query
        name: province_filter
        type: string
      - description: 专业名称关键词，target=major 时可用
        in: query
        name: major_name
        type: string
      - description: 最高学费，预留字段
        in: query
        name: tuition_max
        type: number
      - description: 扩展字段，预留字段
        in: query
        name: include
        type: string
      - description: 排序，预留字段
        in: query
        name: sort
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认20，最大100
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Response'
            - properties:
                data:
                  $ref: '#/definitions/analysis.ScoreMatchResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Response'
      summary: 历史分数/位次匹配
      tags:
      - analysis
