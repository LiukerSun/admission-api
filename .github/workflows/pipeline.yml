name: Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git log --format=%s "$BASE_SHA..$HEAD_SHA" > /tmp/commits.txt
          else
            echo "${{ github.event.head_commit.message }}" | head -n 1 > /tmp/commits.txt
          fi

          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]*\))?: .+"
          INVALID=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if echo "$line" | grep -qE "$PATTERN"; then
              continue
            fi
            echo "INVALID: $line"
            INVALID=1
          done < /tmp/commits.txt

          if [ "$INVALID" -eq 1 ]; then
            echo ""
            echo "ERROR: One or more commit messages do not follow Conventional Commits."
            echo "Format: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

  check-skip:
    name: Check Skip
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          MSG_FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
          SKIP_PREFIXES="^(docs|chore|style|test|ci|build)(\([^)]*\))?: "
          if echo "$MSG_FIRST_LINE" | grep -qE "$SKIP_PREFIXES"; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [commit-lint, check-skip]
    if: needs.check-skip.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@$(grep 'swaggo/swag' go.mod | awk '{print $2}')

      - name: Generate Swagger docs
        run: swag init -g cmd/api/main.go

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [commit-lint, check-skip]
    if: needs.check-skip.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@$(grep 'swaggo/swag' go.mod | awk '{print $2}')

      - name: Generate Swagger docs
        run: swag init -g cmd/api/main.go

      - name: Run unit tests with coverage
        env:
          JWT_SECRET: ci-test-secret-key-unit
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          verbose: true

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [commit-lint, check-skip]
    if: needs.check-skip.outputs.should_run == 'true'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: admission_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@$(grep 'swaggo/swag' go.mod | awk '{print $2}')

      - name: Generate Swagger docs
        run: swag init -g cmd/api/main.go

      - name: Run database migrations
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: admission_test
          POSTGRES_PORT: 5432
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key-integration
        run: go run ./cmd/api -migrate up

      - name: Run integration tests
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: admission_test
          POSTGRES_PORT: 5432
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key-integration
          PORT: 8080
        run: go test -v -tags=integration ./tests/integration/...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [commit-lint, check-skip]
    if: needs.check-skip.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@$(grep 'swaggo/swag' go.mod | awk '{print $2}')

      - name: Generate Swagger docs
        run: swag init -g cmd/api/main.go

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...
          repo-checkout: false

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [commit-lint, check-skip, lint, unit-test, integration-test, security]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_run == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && needs.check-skip.outputs.should_run == 'true'
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # TODO: Add your staging deployment command here
          # Examples:
          # - fly deploy --app admission-api-staging
          # - ssh user@staging-server "docker pull ... && docker compose up -d"
          # - kubectl set image deployment/api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Smoke Test
        run: |
          echo "Running smoke tests against staging..."
          # TODO: Replace with your staging URL
          # curl -sf https://staging.your-api.com/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && needs.check-skip.outputs.should_run == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # TODO: Add your production deployment command here

      - name: Production Smoke Test
        run: |
          echo "Running smoke tests against production..."
          # TODO: Replace with your production URL
          # curl -sf https://your-api.com/health || exit 1
